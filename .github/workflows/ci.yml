name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required files exist
        run: |
          set -e
          missing=0
          for f in manifest.xml monkey.jungle \
                   source/TamagotchiApp.mc source/TamagotchiView.mc source/Pet.mc; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            fi
          done
          [ "$missing" = "0" ] && echo "All required files present."
          exit $missing

      - name: Validate XML is well-formed
        run: |
          python3 - <<'PY'
          import sys, glob, xml.dom.minidom as minidom
          files = ["manifest.xml"] + glob.glob("resources*/**/*.xml", recursive=True)
          bad = 0
          for f in files:
              try:
                  minidom.parse(f)
                  print(f"ok:    {f}")
              except Exception as e:
                  print(f"::error file={f}::{e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

# NOTE: A full Monkey C compile needs a developer key, which is wired up in
# release.yml (runs on version tags) inside a container image that ships the
# Connect IQ SDK. See that file for the one-time GARMIN_DEVELOPER_KEY secret.
